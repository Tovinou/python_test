name: Project 5 Tests

on:
  push:
  pull_request:
    branches: [ main, master ]

jobs:
  # ============================================================
  # NEW: Integration test suite (API + UI) using venv + run_tests.py
  # ============================================================
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create and configure virtual environment
        run: |
          cd project_5/Integration_test
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt
          .venv/bin/python -m playwright install --with-deps chromium

      - name: Run integration tests (API + UI)
        run: |
          cd project_5/Integration_test
          .venv/bin/python scripts/run_tests.py

  # ============================================================
  # Existing standalone Playwright script job (optional)
  # ============================================================
  playwright-script:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
      - name: Install browsers
        run: python -m playwright install --with-deps chromium
      - name: Run Playwright script
        env:
          CI: "true"
          UI_KEEP_OPEN_SECONDS: "0"
        run: python project_5/login_test/playwright/tests/playwright_test.py

  # ============================================================
  # Existing Selenium test job (optional)
  # ============================================================
  selenium-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Selenium
        run: |
          python -m pip install --upgrade pip
          pip install selenium
      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      - name: Run Selenium test
        run: xvfb-run -a python project_5/login_test/Selenium_test/tests/ui_test.py